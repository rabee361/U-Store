{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">متجر</div>

        <!-- Login Card -->
        <div class="auth-card">
            <h1 class="auth-card-title">إنشاء حساب جديد</h1>

            <form class="auth-form" method="post">
                {% csrf_token %}

                <div class="input-group">
                    <input
                        type="email"
                        name="email"
                        class="auth-input"
                        placeholder="باستخدام البريد الإلكتروني"
                        required
                    >
                </div>

                <div class="input-group">
                    <input
                        type="text"
                        name="phone"
                        class="auth-input"
                        placeholder="باستخدام جوجل"
                        required
                    >
                </div>

                <p class="auth-text">لدي حساب بالفعل</p>

                <button type="submit" class="auth-button">
                    تسجيل الدخول
                </button>
            </form>
        </div>
    </div>
</body>
</html>
