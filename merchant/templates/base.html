{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Check for saved theme preference
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="{% static 'js/collapse-nav.js' %}"></script>
    <script src="{% static 'js/theme-toggle.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/sidebar_navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script rel="script" src="{% static 'js/toggle_sidebar.js' %}"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">    
    <title>Dashboard</title>
</head>
<body class="container-body">

    <!-- Add Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar" aria-label="Main navigation">
        <div class="navbar-container">
            <div class="navbar-items">
                <!-- Logo -->
                <div class="navbar-logo">
                    <img src="{% static 'images/oia.jpg' %}" alt="Logo">
                    <span>Old Store</span>
                </div>

                <!-- Controls -->
                <div class="navbar-controls">
                    <!-- Theme Toggle Button -->
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>

                    <!-- Hamburger Menu Button -->
                    <button id="hamburgerMenu" class="hamburger-menu" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            
            <nav class="sidebar-nav">
                <div class="nav-section">

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-home"></i>
                                <span>الرئيسية</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-shopping-cart"></i>
                                <span>الطلبات</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-box"></i>
                                <span>المنتجات</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-tags"></i>
                                <span>التسويق</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-chart-bar"></i>
                                <span>التحليلات</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-wallet"></i>
                                <span>المالية</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-cog"></i>
                                <span>تصميم المتجر</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                        <div class="nav-content">
                            <a href="#" class="sub-item">القوائم</a>
                            <a href="#" class="sub-item">صفحة المتجر</a>
                            <a href="#" class="sub-item">المحتويات الإرشادية</a>
                            <a href="#" class="sub-item">القائمة الرئيسية</a>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-users"></i>
                                <span>الحسابات</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-user-friends"></i>
                                <span>العملاء</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                    <div class="nav-item collapsible">
                        <div class="nav-header">
                            <div class="icon-text-group">
                                <i class="fas fa-cogs"></i>
                                <span>الإعدادات</span>
                            </div>
                            <i class="fas fa-chevron-down arrow"></i>
                        </div>
                    </div>

                </div>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>
        
</body>

</html>
